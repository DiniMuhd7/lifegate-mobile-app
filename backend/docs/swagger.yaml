basePath: /api
host: lifegatemobilebackend-2.onrender.com
info:
  contact:
    email: support@lifegate.health
    name: LifeGate Support
  description: AI-powered clinical diagnostic platform. Patients interact with an
    AI assistant, physicians review AI-generated reports, and administrators manage
    the full lifecycle.
  license:
    name: Proprietary
  termsOfService: https://lifegate.health/terms
  title: LifeGate API
  version: "1.0"
paths:
  /admin/audit:
    get:
      parameters:
      - description: Filter by event type
        in: query
        name: eventType
        type: string
      - description: Filter by actor role
        in: query
        name: actorRole
        type: string
      - description: Filter by resource type
        in: query
        name: resource
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: dateFrom
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: dateTo
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                type: array
              meta:
                type: object
              success:
                type: boolean
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Audit log
      tags:
      - admin
  /admin/audit/export:
    get:
      parameters:
      - description: Filter by event type
        in: query
        name: eventType
        type: string
      - description: Filter by actor role
        in: query
        name: actorRole
        type: string
      - description: Filter by resource type
        in: query
        name: resource
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: dateFrom
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: dateTo
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: CSV file download
          schema:
            type: file
        "500":
          description: Internal Server Error
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Export audit log CSV
      tags:
      - admin
  /admin/cases:
    get:
      parameters:
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: pageSize
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by urgency
        in: query
        name: urgency
        type: string
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Search by patient name or condition
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                type: array
              meta:
                properties:
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
                type: object
              success:
                type: boolean
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Admin case list
      tags:
      - admin
  /admin/compliance/ndpa:
    get:
      parameters:
      - description: Max results (default 30)

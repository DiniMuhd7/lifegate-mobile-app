  /auth/change-password:
    put:
      consumes:
      - application/json
      parameters:
      - description: Password change payload
        in: body
        name: body
        required: true
        schema:
          properties:
            currentPassword:
              type: string
            newPassword:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password. Physicians receive a 2FA
        OTP instead of a token.
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  token:
                    type: string
                  user:
                    type: object
                type: object
              message:
                type: string
              success:
                type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
        "429":
          description: Too Many Requests
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      summary: Login
      tags:
      - auth
  /auth/login/resend-2fa:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
        "429":
          description: Too Many Requests
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      summary: Resend physician 2FA code
      tags:
      - auth
  /auth/login/verify-2fa:
    post:
      consumes:
      - application/json
      description: Submit the OTP sent to a physician's email after password authentication.
      parameters:
      - description: OTP payload
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            otp:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  token:
                    type: string
                  user:
                    type: object
                type: object
              message:
                type: string
              success:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
        "429":
          description: Too Many Requests
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      summary: Verify physician 2FA
      tags:
      - auth
  /auth/mdcn-verify:
    patch:
      description: Marks the authenticated physician's MDCN license as verified. Requires
        role=professional.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  user:
                    type: object
                type: object
              message:
                type: string
              success:
                type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Confirm MDCN verification
      tags:
      - auth

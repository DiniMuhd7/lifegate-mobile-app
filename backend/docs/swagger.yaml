              success:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Trigger SLA flag check
      tags:
      - admin
  /admin/settings/alerts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                type: array
              success:
                type: boolean
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              message:
                type: string
              success:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Get alert thresholds
      tags:
      - admin
  /admin/settings/alerts/{key}:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Threshold key
        in: path
        name: key
        required: true
        type: string
      - description: New values
        in: body
        name: body
        required: true
        schema:
          properties:
            enabled:
              type: boolean
            value:
              type: number
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              success:

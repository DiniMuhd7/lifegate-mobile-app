# nginx/nginx.conf
# Nginx reverse proxy + load balancer for LifeGate backend.
# Routes all traffic to the two backend replicas in round-robin.

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # ── Logging ─────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    gzip            on;
    gzip_types      application/json text/plain;

    # ── Upstream (Docker Compose service name resolves to both replicas) ─────
    upstream backend {
        server backend:5000;
        keepalive 32;
    }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 60 requests/minute per IP for the API; burst of 20 allows short spikes.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         DENY;
        add_header X-XSS-Protection        "1; mode=block";
        add_header Referrer-Policy         "strict-origin-when-cross-origin";

        client_max_body_size 20M;

        # ── Health probe (not rate-limited) ────────────────────────────────
        location = /health {
            proxy_pass         http://backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout    5s;
        }

        location = /health/ready {
            proxy_pass         http://backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout    5s;
        }

        # ── WebSocket upgrade ──────────────────────────────────────────────
        location /ws {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     86400s;
        }

        # ── API (rate-limited) ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_set_header       Connection        "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }
    }
}

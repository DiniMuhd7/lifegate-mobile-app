version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # ⚠️ Development-only credentials — change these for staging/production
      POSTGRES_DB: lifegate
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d lifegate']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--jetstream', '-m', '8222']
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8222/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (horizontally scaled — 2 stateless replicas behind nginx) ──────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    # No host port binding — traffic arrives only through the nginx proxy.
    expose:
      - '5000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1          # rolling update — one replica at a time
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:5000/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy / load balancer ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
